name: CI Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ develop ]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t airflow-image .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements-dev.txt

      - run: ruff check src tests
      - run: ruff format --check
      - run: sqlfluff lint sql --dialect postgres

      - name: Validate DAGs
        run: |
            docker run airflow-image airflow dags list

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements-dev.txt
      - run: pytest --cov=src --cov-report=xml

  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Wait for DB
        run: |
          until pg_isready -h localhost -p 5432; do
            sleep 2
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements-dev.txt

      - run: pytest -m integration
